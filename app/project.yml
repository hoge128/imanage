name: Imanage

options:
  bundleIdPrefix: com.itotsum
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  # Localizable.xcstrings の sourceLanguage と揃える（原文は日本語）
  developmentLanguage: ja

# String Catalog に含まれる言語。xcodegen 再生成でも失われないよう明示する。
knownRegions:
  - Base
  - ja
  - en

schemes:
  Imanage:
    build:
      targets:
        Imanage: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Imanage:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Imanage
    entitlements:
      # xcodegen が generate のたびにこのプロパティから .entitlements を再生成するため、
      # サンドボックスのキーは（ファイルを直接編集せず）ここに書くこと。
      path: Imanage/Imanage.entitlements
      properties:
        # Mac App Store 配布には App Sandbox が必須。
        com.apple.security.app-sandbox: true
        # ドロップ / NSOpenPanel でユーザーが選んだファイル・フォルダの読み書き。
        com.apple.security.files.user-selected.read-write: true
        # 選んだ出力先を再起動後も使えるようにする app-scoped bookmark
        # （Core/SecurityScope.swift）。
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.itotsum.imanage
        # ブランド表記は小文字 imanage。App Store 検証は .app 名と CFBundleName の
        # 一致を求めるため、PRODUCT_NAME / CFBundleName / CFBundleDisplayName を揃える。
        PRODUCT_NAME: imanage
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: KTQ8JQW28L
        CODE_SIGN_STYLE: Automatic
        # Icon Composer 形式（Resources/AppIcon.icon）をアプリアイコンに使う
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Imanage/Resources/Info.plist
      properties:
        CFBundleName: imanage
        CFBundleDisplayName: imanage
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
        CFBundleIdentifier: com.itotsum.imanage
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSHumanReadableDescription: "EXIF-based photo file organizer"
        NSHumanReadableCopyright: "Copyright © 2026 hoge128 (Tsuyoshi Ito). All rights reserved."
        LSApplicationCategoryType: "public.app-category.photography"
        # 独自の暗号化を一切使わないため輸出コンプライアンス審査は不要。
        # これが無いと ASC がビルドごとに輸出コンプライアンスの回答を求めてくる。
        ITSAppUsesNonExemptEncryption: false
        # メニューバー常駐（ウィンドウを閉じても Dock に残さない場合は true に変更）
        LSUIElement: false
