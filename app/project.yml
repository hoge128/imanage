name: Imanage

options:
  bundleIdPrefix: io.github.imanage
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  # Localizable.xcstrings の sourceLanguage と揃える（原文は日本語）
  developmentLanguage: ja

# String Catalog に含まれる言語。xcodegen 再生成でも失われないよう明示する。
knownRegions:
  - Base
  - ja
  - en

schemes:
  Imanage:
    build:
      targets:
        Imanage: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Imanage:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Imanage
    settings:
      base:
        SWIFT_VERSION: 6.0
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imanage
        PRODUCT_NAME: Imanage
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: YES
        # Icon Composer 形式（Resources/AppIcon.icon）をアプリアイコンに使う
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Imanage/Resources/Info.plist
      properties:
        CFBundleName: Imanage
        CFBundleDisplayName: Imanage
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
        CFBundleIdentifier: io.github.imanage
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSHumanReadableDescription: "EXIF-based photo file organizer"
        NSHumanReadableCopyright: "Copyright © 2026 hoge128. All rights reserved."
        LSApplicationCategoryType: "public.app-category.photography"
        # メニューバー常駐（ウィンドウを閉じても Dock に残さない場合は true に変更）
        LSUIElement: false
